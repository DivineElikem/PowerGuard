services:
  # Backend FastAPI Service
  - type: web
    name: energy-meter-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend.Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      # Neon connection string, set in the dashboard. Render's own free Postgres
      # expires 30 days after creation and is then deleted; Neon's free tier does not.
      - key: DATABASE_URL
        sync: false
      - key: MQTT_BROKER
        sync: false
      - key: MQTT_PORT
        value: "1883"
      - key: MQTT_TOPIC
        value: energy/readings
      - key: GROQ_API_KEY
        sync: false
      - key: START_SIMULATOR
        value: "true"

  # Frontend Next.js Service
  - type: web
    name: energy-meter-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: frontend # Point to the frontend directory
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: energy-meter-backend
          property: url
