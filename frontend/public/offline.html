<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · PowerGuard</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        max-width: 22rem;
        text-align: center;
      }
      .badge {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.25rem;
        border-radius: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #3b82f6;
        box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
      }
      h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
      p { color: #64748b; line-height: 1.6; margin: 0 0 1.5rem; font-weight: 500; }
      button {
        border: 0;
        background: #0f172a;
        color: #fff;
        font-weight: 700;
        padding: 0.75rem 1.5rem;
        border-radius: 0.9rem;
        font-size: 0.95rem;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f8fafc; }
        p { color: #94a3b8; }
        button { background: #3b82f6; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#fff" stroke="none" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>PowerGuard can't reach the network right now. Live energy readings will resume once you're back online.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
